<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Smart To-Do List</h1>
            <p class="subtitle">Organize your tasks efficiently</p>
        </header>

        <div class="input-section">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="Add a new task..." 
                autocomplete="off"
            >
            <button id="addBtn" class="btn btn-primary">Add Task</button>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <div class="stats">
            <span id="totalTasks">Total: 0</span>
            <span id="activeTasks">Active: 0</span>
            <span id="completedTasks">Completed: 0</span>
        </div>

        <ul id="taskList" class="task-list">
            <li>Code</li>
        </ul>

        <div class="actions">
            <button id="clearCompleted" class="btn btn-secondary">Clear Completed</button>
            <button id="clearAll" class="btn btn-danger">Clear All</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
